    <!-- ── Styles ───────────────────────────────────────────────────── -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- ── Fonts ────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ── Scripts (CDN) ────────────────────────────────────────────── -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <!-- Custom Cursor (hidden on touch via CSS) -->
    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="cursor-ring" aria-hidden="true"></div>

    <!-- Scroll progress line at top -->
    <div id="scroll-progress" aria-hidden="true"></div>

    <!-- Photo caption (location + year on hover) -->
    <div id="photo-caption" aria-live="polite" aria-atomic="true">
        <span id="caption-location"></span>
        <span id="caption-divider" aria-hidden="true">&mdash;</span>
        <span id="caption-year"></span>
    </div>

    <!-- WebGL Canvas -->
    <canvas id="spatial-canvas" aria-label="Interactive 3D photography archive"></canvas>

    <!-- HUD overlay -->
    <div class="hud" role="banner">
        <header class="hud-header">
            <h1 class="logo">
                <a href="https://photography.pratyushdadhich.com/" style="color:inherit;text-decoration:none;"
                    aria-label="Pratyush Dadhich — Main Site">PRATYUSH DADHICH</a>
            </h1>
            <nav aria-label="Primary navigation">
                <a href="about.html" class="nav-elem">EXHIBITION</a>
                <a href="mailto:prdadhich7@gmail.com" class="nav-elem">INQUIRY</a>
            </nav>
        </header>

        <div class="hero-overlay" aria-live="polite">
            <h2 class="hero-title">WHERE LIGHT BECOMES<br>MEMORY</h2>
            <p class="hero-subtitle">SCROLL TO EXPLORE THE ARCHIVE</p>
        </div>

        <div class="end-overlay" style="opacity:0; pointer-events:none;" aria-hidden="true">
            <h2 class="hero-title">PHOTOGRAPHY BY<br>PRATYUSH DADHICH</h2>
            <p class="hero-subtitle">END OF ARCHIVE - <a href="about.html"
                    style="color:inherit;letter-spacing:inherit;">EXHIBITION →</a></p>
        </div>

        <footer class="hud-footer">
            <div class="scroll-prompt" aria-label="Scroll indicator">
                <span class="indicator" aria-hidden="true"></span>
                <span>DESCENT</span>
            </div>
            <!-- Frame counter: updates live as you scroll through the archive -->
            <div class="coordinates" aria-live="polite">
                <span id="frame-counter"></span>
            </div>
        </footer>
    </div>

    <!-- Scroll proxy — height set dynamically by PortfolioScene -->
    <div id="scroll-proxy" aria-hidden="true"></div>

    <!-- Engine scripts -->
    <script src="assets/js/three-scene.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
